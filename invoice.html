<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refiniti | Branded Invoice</title>
    <link rel="stylesheet" href="dist/style.css">
    <link rel="stylesheet" href="proposal.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Space+Grotesk:wght@300;400;500;600;700&swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #08080A;
            --card-bg: #0D0D12;
            --cyan-accent: #00F2FF;
            --border-color: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
        }
        .invoice-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .cyan-glow {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }
    </style>
</head>
<body class="bg-[#08080A] text-white min-h-screen flex items-center justify-center p-4 md:p-8">
    <div class="max-w-4xl w-full">
        <!-- Brand Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-cyan-accent rounded-xl flex items-center justify-center cyan-glow">
                    <i data-lucide="Zap" class="text-black w-7 h-7 fill-current"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight font-space uppercase">Refiniti<span class="text-cyan-accent">.ai</span></h1>
                    <p class="text-xs text-gray-500 uppercase tracking-widest font-medium">Performance Engine</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-sm text-gray-400">Invoice ID: <span id="invoice-id" class="text-white font-mono">#INV-XXXX</span></p>
                <p class="text-sm text-gray-400">Date: <span id="invoice-date" class="text-white"></span></p>
            </div>
        </div>

        <div class="invoice-card rounded-3xl overflow-hidden">
            <!-- Main Content -->
            <div class="p-8 md:p-12">
                <div class="grid md:grid-cols-2 gap-12 mb-12">
                    <!-- Client Info -->
                    <div>
                        <h2 class="text-xs font-bold text-cyan-accent uppercase tracking-widest mb-4">Bill To</h2>
                        <div class="space-y-1">
                            <p id="client-name" class="text-xl font-semibold">Valued Client</p>
                            <p id="client-email" class="text-gray-400">client@example.com</p>
                        </div>
                    </div>
                    <!-- Status -->
                    <div class="md:text-right">
                        <h2 class="text-xs font-bold text-cyan-accent uppercase tracking-widest mb-4">Status</h2>
                        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 text-sm font-medium">
                            <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                            Awaiting Payment
                        </div>
                    </div>
                </div>

                <!-- Line Items -->
                <div class="mb-12">
                    <table class="w-full">
                        <thead>
                            <tr class="text-left border-b border-white/5 pb-4">
                                <th class="text-xs font-bold text-gray-500 uppercase tracking-widest pb-4">Description</th>
                                <th class="text-xs font-bold text-gray-500 uppercase tracking-widest pb-4 text-right">Amount</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5" id="line-items-body">
                            <!-- Dynamic line items will be inserted here -->
                        </tbody>
                    </table>
                </div>

                <!-- Totals -->
                <div class="flex flex-col items-end gap-4">
                    <div class="w-full md:w-64 space-y-3">
                        <div class="flex justify-between text-sm text-gray-400">
                            <span>Subtotal</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="flex justify-between text-sm text-gray-400">
                            <span>Tax (0%)</span>
                            <span>$0.00</span>
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t border-white/10">
                            <span class="text-lg font-bold">Total Due</span>
                            <span id="total-amount" class="text-2xl font-extrabold text-cyan-accent">$0.00</span>
                        </div>
                    </div>
                </div>

                <!-- Action Button -->
                <div id="payment-trigger-container" class="mt-12 flex flex-col items-center gap-4">
                    <button id="pay-button-trigger" class="w-full md:w-auto px-12 py-4 bg-cyan-accent text-black font-bold rounded-2xl hover:scale-105 transition-transform cyan-glow flex items-center justify-center gap-2">
                        <i data-lucide="credit-card" class="w-5 h-5"></i>
                        Complete Payment
                    </button>
                    <p class="text-xs text-gray-500 flex items-center gap-2">
                        <i data-lucide="shield-check" class="w-4 h-4 text-green-500"></i>
                        Secure encrypted payment powered by Stripe
                    </p>
                </div>

            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center">
            <p class="text-gray-600 text-sm italic">"The future belongs to those who build it." — Refiniti</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name') || 'Valued Client';
            const email = urlParams.get('email') || '';
            let amount = urlParams.get('amount') || '0.00';
            const id = urlParams.get('id') || 'INV-' + Math.floor(Math.random() * 9000 + 1000);
            const checkoutUrl = urlParams.get('checkoutUrl'); // Get Stripe Checkout URL (legacy, not used)
            
            // Ensure amount is a valid number
            // For Canyon Lake, always set to 2500
            if (id === 'CANYON-LAKE') {
                amount = '2500';
            } else if (!amount || amount === '0' || amount === '0.00' || isNaN(parseFloat(amount))) {
                // If amount is missing or invalid for non-Canyon Lake, keep as 0.00
                amount = '0.00';
            }

            document.getElementById('client-name').textContent = name;
            document.getElementById('client-email').textContent = email;
            document.getElementById('invoice-id').textContent = '#' + id;
            
            const date = new Date();
            document.getElementById('invoice-date').textContent = date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            // Handle Canyon Lake specific items or dynamic items
            const lineItemsBody = document.getElementById('line-items-body');
            let subtotal = 0;

            if (id === 'CANYON-LAKE') {
                lineItemsBody.innerHTML = `
                    <tr>
                        <td class="py-6">
                            <p class="font-medium text-lg">Canyon Lake Performance Engine - Upfront Setup</p>
                            <p class="text-sm text-gray-500 mt-1">One-time setup fee</p>
                        </td>
                        <td class="py-6 text-right font-semibold text-lg">$2,500.00</td>
                    </tr>
                    <tr>
                        <td class="py-6">
                            <p class="font-medium text-lg">Canyon Lake Performance Engine - Monthly Performance</p>
                            <p class="text-sm text-gray-500 mt-1">Recurring monthly fee (3 months)</p>
                        </td>
                        <td class="py-6 text-right font-semibold text-lg">$500.00/month</td>
                    </tr>
                `;
                subtotal = 2500; // Only upfront for subtotal display, recurring is separate
                amount = '2500'; // Set amount for Canyon Lake
                document.getElementById('total-amount').textContent = '$' + subtotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                document.getElementById('subtotal').textContent = '$' + subtotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            } else {
                const amountNum = parseFloat(amount) || 0;
                const formattedAmount = amountNum.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                lineItemsBody.innerHTML = `
                    <tr>
                        <td class="py-6">
                            <p id="service-name" class="font-medium text-lg">Refiniti Engine Services</p>
                            <p class="text-sm text-gray-500 mt-1">Service description</p>
                        </td>
                        <td id="item-price" class="py-6 text-right font-semibold text-lg">$${formattedAmount}</td>
                    </tr>
                `;
                subtotal = amountNum;
                document.getElementById('total-amount').textContent = '$' + subtotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                document.getElementById('subtotal').textContent = '$' + subtotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }

            // Redirect to custom checkout page
            const triggerButton = document.getElementById('pay-button-trigger');
            
            if (triggerButton) {
                triggerButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    // Validate amount before proceeding
                    const amountNum = parseFloat(amount) || 0;
                    if (amountNum <= 0 && id !== 'CANYON-LAKE') {
                        alert('Invalid payment amount. Please contact support.');
                        return;
                    }
                    
                    // Build checkout URL with current invoice parameters
                    const checkoutParams = new URLSearchParams({
                        name: name,
                        email: email,
                        amount: amount,
                        id: id
                    });
                    
                    // Redirect to custom checkout page
                    window.location.href = `checkout.html?${checkoutParams.toString()}`;
                });
            } else {
                console.error('Pay button not found!');
            }
        });
    </script>
</body>
</html>
