<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joseph Maloney | Refiniti AI</title>
    <meta name="description" content="Connect with Joseph Maloney at Refiniti AI. Get in touch by phone, email, or LinkedIn and claim your exclusive offer.">
    <meta property="og:title" content="Joseph Maloney | Refiniti AI">
    <meta property="og:description" content="Connect with Joseph Maloney at Refiniti AI.">
    <meta property="og:image" content="https://refiniti.ai/Images/Joseph%20Maloney.JPG">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://refiniti.ai/joseph-maloney-business-card.html">
    <link rel="icon" href="Images/Refiniti Favicon.png" type="image/png">
    <link rel="stylesheet" href="dist/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, Arial, sans-serif;
            color: #ffffff;
            background:
                radial-gradient(circle at 20% 0%, rgba(0, 207, 255, 0.25), transparent 35%),
                radial-gradient(circle at 80% 100%, rgba(0, 128, 255, 0.25), transparent 35%),
                #08080a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            border-radius: 28px;
            background: rgba(17, 17, 20, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 28px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #9defff;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0, 207, 255, 0.35);
            background: rgba(0, 207, 255, 0.1);
            margin-bottom: 18px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            border: 2px solid rgba(0, 207, 255, 0.5);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
            display: block;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 32px;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .role {
            margin: 0 0 20px;
            color: #9defff;
            font-weight: 600;
        }

        .contact-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 10px;
            color: rgba(255, 255, 255, 0.9);
            word-break: break-word;
        }

        .button-grid {
            margin-top: 22px;
            display: grid;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            background: rgba(255, 255, 255, 0.04);
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            border-color: rgba(0, 207, 255, 0.65);
            background: rgba(0, 207, 255, 0.12);
        }

        .btn-primary {
            background: #00cfff;
            color: #00151b;
            border-color: #00cfff;
        }

        .btn-primary:hover {
            background: #33ddff;
            border-color: #33ddff;
        }
    </style>
</head>
<body>
    <main class="card">
        <span class="badge">
            <i data-lucide="sparkles" aria-hidden="true"></i>
            Refiniti AI
        </span>

        <img class="avatar" src="Images/Joseph%20Maloney.JPG" alt="Joseph Maloney portrait">

        <h1>Joseph Maloney</h1>
        <p class="role">Business Growth Strategist</p>

        <p class="contact-line">
            <i data-lucide="mail" aria-hidden="true"></i>
            <a href="mailto:Joseph@refiniti.ai" class="text-white underline">Joseph@refiniti.ai</a>
        </p>
        <p class="contact-line">
            <i data-lucide="phone" aria-hidden="true"></i>
            <a href="tel:+14806013721" class="text-white underline">+1 480-601-3721</a>
        </p>

        <div class="button-grid">
            <a class="btn" href="mailto:Joseph@refiniti.ai">
                <i data-lucide="send" aria-hidden="true"></i>
                Email Joseph
            </a>
            <a class="btn" href="tel:+14806013721">
                <i data-lucide="phone-call" aria-hidden="true"></i>
                Call Joseph
            </a>
            <a class="btn" href="https://www.linkedin.com/in/joseph-maloney-1642521b9/" target="_blank" rel="noopener noreferrer">
                <i data-lucide="linkedin" aria-hidden="true"></i>
                Connect on LinkedIn
            </a>
            <a class="btn btn-primary" href="https://refiniti.ai/form" target="_blank" rel="noopener noreferrer">
                <i data-lucide="rocket" aria-hidden="true"></i>
                Claim Exclusive Offer
            </a>
        </div>
    </main>

    <script>
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>
</html>
